name: Deploy to Server

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            echo "DEPLOY_SCRIPT_V3"
            PROJECT_DIR="/srv/vol-registr"

            cd "$PROJECT_DIR"
            git pull --ff-only origin master

            python3 -m venv .venv
            . .venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt
            pip install gunicorn

            python manage.py migrate
            python manage.py collectstatic --noinput

            LISTEN_PID="$(ss -ltnp 2>/dev/null | awk '/127.0.0.1:8001|0.0.0.0:8001/ {print $NF}' | sed -n 's/.*pid=\([0-9]\+\).*/\1/p' | head -n 1)"
            if [ -n "$LISTEN_PID" ] && kill -0 "$LISTEN_PID" 2>/dev/null; then
              kill "$LISTEN_PID" || true
              sleep 2
            fi

            setsid .venv/bin/gunicorn vol_registr.wsgi:application \
              --bind 0.0.0.0:8001 \
              --workers 3 \
              --timeout 120 \
              > gunicorn.log 2>&1 < /dev/null &

            sleep 2
            curl -fsS http://127.0.0.1:8001 > /dev/null
