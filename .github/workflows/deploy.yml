name: Deploy to Server

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            echo "DEPLOY_SCRIPT_V3"
            PROJECT_DIR="/srv/vol-registr"

            cd "$PROJECT_DIR"
            git pull --ff-only origin master

            python3 -m venv .venv
            . .venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt
            pip install gunicorn

            python manage.py migrate
            python manage.py collectstatic --noinput

            echo "Stopping old gunicorn processes..."
            # Use pgrep to safely kill without killing the shell script itself
            pgrep -f "gunicorn.*vol_registr" | xargs -r kill || true
            sleep 2

            setsid .venv/bin/gunicorn vol_registr.wsgi:application \
              --bind 0.0.0.0:8001 \
              --workers 3 \
              --timeout 120 \
              > gunicorn.log 2>&1 < /dev/null &

            sleep 2
            curl -fsS http://127.0.0.1:8001 > /dev/null
